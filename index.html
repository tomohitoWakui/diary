<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWOL</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    background: #fff;
    color: #111;
    padding: 2rem 1.5rem;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #111; color: #eee; }
    .thumb-wrap { background: #222; }
    .date { color: #eee; }
    .entry-link:hover .date { color: #aaa; }
  }
  h1 {
    font-size: 1rem;
    font-weight: 400;
    color: #999;
    margin-bottom: 2rem;
    letter-spacing: 0.05em;
  }
  #list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 1.2rem;
    list-style: none;
  }
  .entry-link {
    text-decoration: none;
    display: block;
  }
  .thumb-wrap {
    width: 100%;
    background: #f0f0f0;
    overflow: hidden;
  }
  .thumb-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .date {
    display: block;
    font-size: 0.7rem;
    letter-spacing: 0.02em;
    color: #111;
    margin-top: 0.35rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  @media (prefers-color-scheme: dark) { .date { color: #eee; } }
  .entry-link:hover .date { color: #999; }
  #loading { color: #999; font-size: 0.9rem; }
</style>
</head>
<body>
<h1>AWOL</h1>
<div id="loading">loading...</div>
<ul id="list"></ul>
<script>
fetch('index.json')
  .then(r => r.json())
  .then(entries => {
    document.getElementById('loading').remove();
    const ul = document.getElementById('list');

    // グリッドの列幅を計算してから描画
    const sorted = [...entries].sort((a, b) => b[0].localeCompare(a[0]));

    function render() {
      // 1列の実際のpx幅を取得
      const colWidth = Math.floor((ul.getBoundingClientRect().width - (1.2 * 16 * 5)) / 6) || 120;

      sorted.forEach(([date, thumb]) => {
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.className = 'entry-link';
        a.href = `entry.html?date=${date}`;

        const wrap = document.createElement('div');
        wrap.className = 'thumb-wrap';

        if (thumb) {
          const img = document.createElement('img');
          img.src = thumb;
          img.alt = '';
          img.loading = 'lazy';
          // onloadでラップの高さを画像の実際の幅に合わせる
          img.style.width = '100%';
          img.style.height = 'auto';
          wrap.appendChild(img);
        }

        const dateEl = document.createElement('span');
        dateEl.className = 'date';
        dateEl.textContent = date;

        a.appendChild(wrap);
        a.appendChild(dateEl);
        li.appendChild(a);
        ul.appendChild(li);
      });

      // ResizeObserverで列幅変化時に正方形を維持
      const ro = new ResizeObserver(() => {
        ul.querySelectorAll('.thumb-wrap').forEach(wrap => {
          wrap.style.height = wrap.offsetWidth + 'px';
        });
      });
      ro.observe(ul);
      // 初回適用
      ul.querySelectorAll('.thumb-wrap').forEach(wrap => {
        wrap.style.height = wrap.offsetWidth + 'px';
      });
    }

    render();
  })
  .catch(() => {
    document.getElementById('loading').textContent = 'no entries yet.';
  });
</script>
</body>
</html>
