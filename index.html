<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWOL</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    background: #fff;
    color: #111;
    padding: 2rem 1.5rem;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #111; color: #eee; }
    .bg { background: #222; }
    .date { color: #eee; }
  }
  h1 { font-size: 1rem; font-weight: 400; color: #999; margin-bottom: 2rem; }
  #list { list-style: none; display: flex; flex-wrap: wrap; gap: 12px; }
  #list li a { display: block; text-decoration: none; }
  .bg { background: #f0f0f0; overflow: hidden; }
  .bg img { display: block; object-fit: cover !important; }
  .date { display: block; font-size: 0.7rem; color: #111; margin-top: 4px; }
  @media (prefers-color-scheme: dark) { .date { color: #eee; } }
  a:hover .date { color: #999; }
  #loading { color: #999; font-size: 0.9rem; }
</style>
</head>
<body>
<h1>AWOL</h1>
<div id="loading">loading...</div>
<ul id="list"></ul>
<script>
const GAP = 12;
const MIN = 100;

function getSize() {
  const W = document.getElementById('list').offsetWidth;
  const cols = Math.max(1, Math.floor((W + GAP) / (MIN + GAP)));
  return Math.floor((W - GAP * (cols - 1)) / cols);
}

function applySize() {
  const S = getSize();
  document.querySelectorAll('.bg').forEach(el => {
    el.style.width = S + 'px';
    el.style.height = S + 'px';
  });
  document.querySelectorAll('.bg img').forEach(el => {
    el.setAttribute('width', S);
    el.setAttribute('height', S);
    el.style.width = S + 'px';
    el.style.height = S + 'px';
  });
  document.querySelectorAll('.date').forEach(el => {
    el.style.width = S + 'px';
  });
}

fetch('index.json')
  .then(r => r.json())
  .then(entries => {
    document.getElementById('loading').remove();
    const ul = document.getElementById('list');
    const sorted = [...entries].sort((a, b) => b[0].localeCompare(a[0]));

    sorted.forEach(([date, thumb]) => {
      const li  = document.createElement('li');
      const a   = document.createElement('a');
      a.href    = 'entry.html?date=' + date;
      const bg  = document.createElement('div');
      bg.className = 'bg';
      if (thumb) {
        const img   = document.createElement('img');
        img.src     = thumb;
        img.alt     = '';
        img.loading = 'lazy';
        img.onload  = applySize;
        bg.appendChild(img);
      }
      const span = document.createElement('span');
      span.className   = 'date';
      span.textContent = date;
      a.appendChild(bg);
      a.appendChild(span);
      li.appendChild(a);
      ul.appendChild(li);
    });

    applySize();
    window.addEventListener('resize', applySize);
  });
</script>
</body>
</html>
