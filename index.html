<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWOL</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    background: #fff;
    color: #111;
    padding: 2rem 1.5rem;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #111; color: #eee; }
    .cell-bg { background: #222; }
    .date { color: #eee; }
  }
  h1 {
    font-size: 1rem;
    font-weight: 400;
    color: #999;
    margin-bottom: 2rem;
    letter-spacing: 0.05em;
  }
  #list {
    list-style: none;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
  }
  #list li {
    width: 120px;
  }
  #list li a {
    display: block;
    text-decoration: none;
  }
  .cell-bg {
    width: 120px;
    height: 120px;
    background: #f0f0f0;
    overflow: hidden;
  }
  .cell-bg img {
    width: 120px;
    height: 120px;
    object-fit: cover;
    display: block;
  }
  .date {
    display: block;
    width: 120px;
    font-size: 0.7rem;
    color: #111;
    margin-top: 0.3rem;
    text-align: left;
  }
  @media (prefers-color-scheme: dark) { .date { color: #eee; } }
  a:hover .date { color: #999; }
  #loading { color: #999; font-size: 0.9rem; }
</style>
</head>
<body>
<h1>AWOL</h1>
<div id="loading">loading...</div>
<ul id="list"></ul>
<script>
fetch('index.json')
  .then(r => r.json())
  .then(entries => {
    document.getElementById('loading').remove();
    const ul = document.getElementById('list');
    const sorted = [...entries].sort((a, b) => b[0].localeCompare(a[0]));
    sorted.forEach(([date, thumb]) => {
      const li = document.createElement('li');
      const a = document.createElement('a');
      a.href = 'entry.html?date=' + date;
      const bg = document.createElement('div');
      bg.className = 'cell-bg';
      if (thumb) {
        const img = document.createElement('img');
        img.src = thumb;
        img.alt = '';
        img.loading = 'lazy';
        bg.appendChild(img);
      }
      const dateEl = document.createElement('span');
      dateEl.className = 'date';
      dateEl.textContent = date;
      a.appendChild(bg);
      a.appendChild(dateEl);
      li.appendChild(a);
      ul.appendChild(li);
    });
  })
  .catch(() => {
    document.getElementById('loading').textContent = 'no entries yet.';
  });
</script>
</body>
</html>
