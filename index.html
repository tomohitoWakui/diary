<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWOL</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    background: #fff;
    color: #111;
    padding: 2rem 1.5rem;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #111; color: #eee; }
    .thumb { background: #222; }
    .date { color: #eee; }
    .entry-link:hover .date { color: #aaa; }
  }
  h1 {
    font-size: 1rem;
    font-weight: 400;
    color: #999;
    margin-bottom: 2rem;
    letter-spacing: 0.05em;
  }
  #list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 1.2rem;
    list-style: none;
  }
  .entry-link {
    text-decoration: none;
    display: block;
  }
  /* container-type でセル幅を基準にする */
  li {
    container-type: inline-size;
  }
  .thumb {
    width: 100%;
    height: 100cqi; /* コンテナ幅と同じ高さ = 正方形 */
    object-fit: cover;
    display: block;
    background: #f0f0f0;
  }
  .date {
    display: block;
    font-size: 0.7rem;
    letter-spacing: 0.02em;
    color: #111;
    margin-top: 0.35rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  @media (prefers-color-scheme: dark) { .date { color: #eee; } }
  .entry-link:hover .date { color: #999; }
  #loading { color: #999; font-size: 0.9rem; }
</style>
</head>
<body>
<h1>AWOL</h1>
<div id="loading">loading...</div>
<ul id="list"></ul>
<script>
fetch('index.json')
  .then(r => r.json())
  .then(entries => {
    document.getElementById('loading').remove();
    const ul = document.getElementById('list');
    const sorted = [...entries].sort((a, b) => b[0].localeCompare(a[0]));
    sorted.forEach(([date, thumb]) => {
      const li = document.createElement('li');
      const a = document.createElement('a');
      a.className = 'entry-link';
      a.href = `entry.html?date=${date}`;

      const img = document.createElement('img');
      img.className = 'thumb';
      img.src = thumb || '';
      img.alt = '';
      img.loading = 'lazy';

      const dateEl = document.createElement('span');
      dateEl.className = 'date';
      dateEl.textContent = date;

      a.appendChild(img);
      a.appendChild(dateEl);
      li.appendChild(a);
      ul.appendChild(li);
    });
  })
  .catch(() => {
    document.getElementById('loading').textContent = 'no entries yet.';
  });
</script>
</body>
</html>
