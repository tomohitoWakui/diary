<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>diary</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    background: #fff;
    color: #111;
    padding: 2rem 1.5rem;
    margin: 0 auto;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #111; color: #eee; }
    a { color: #eee; }
    a:hover { color: #aaa; }
    .thumb-empty { background: #222; }
  }
  h1 {
    font-size: 1rem;
    font-weight: 400;
    color: #999;
    margin-bottom: 2rem;
    letter-spacing: 0.05em;
  }
  #list {
    display: flex;
    flex-wrap: wrap;
    gap: 0.8rem;
    list-style: none;
  }
  .entry-link {
    text-decoration: none;
    color: #111;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }
  .entry-link:hover .date { color: #999; }
  .thumb {
    width: 80px;
    height: 80px;
    object-fit: cover;
    display: block;
  }
  .thumb-empty {
    width: 80px;
    height: 80px;
    background: #f0f0f0;
    display: block;
  }
  .date {
    font-size: 0.75rem;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }
  #loading { color: #999; font-size: 0.9rem; }
</style>
</head>
<body>
<h1>diary</h1>
<div id="loading">loading...</div>
<ul id="list"></ul>
<script>
fetch('index.json')
  .then(r => r.json())
  .then(entries => {
    document.getElementById('loading').remove();
    const ul = document.getElementById('list');
    const sorted = [...entries].sort((a, b) => b[0].localeCompare(a[0]));
    sorted.forEach(([date, thumb]) => {
      const li = document.createElement('li');
      const a = document.createElement('a');
      a.className = 'entry-link';
      a.href = `entry.html?date=${date}`;

      if (thumb) {
        const img = document.createElement('img');
        img.className = 'thumb';
        img.src = thumb;
        img.alt = '';
        img.loading = 'lazy';
        a.appendChild(img);
      } else {
        const empty = document.createElement('span');
        empty.className = 'thumb-empty';
        a.appendChild(empty);
      }

      const dateEl = document.createElement('span');
      dateEl.className = 'date';
      dateEl.textContent = date;
      a.appendChild(dateEl);

      li.appendChild(a);
      ul.appendChild(li);
    });
  })
  .catch(() => {
    document.getElementById('loading').textContent = 'no entries yet.';
  });
</script>
</body>
</html>
