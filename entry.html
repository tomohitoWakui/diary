<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWOL</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    background: #fff;
    color: #111;
    padding: 2rem 1.5rem;
    max-width: 640px;
    margin: 0 auto;
    line-height: 1.8;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #111; color: #eee; }
    a { color: #eee; }
    nav a { color: #999; }
    nav a:hover { color: #eee; }
    nav { border-color: #333; }
  }
  header {
    display: flex;
    align-items: baseline;
    gap: 1.5rem;
    margin-bottom: 2.5rem;
  }
  header a {
    color: #999;
    text-decoration: none;
    font-size: 0.85rem;
    letter-spacing: 0.04em;
  }
  header a:hover { color: #111; }
  h1 {
    font-size: 1rem;
    font-weight: 400;
    letter-spacing: 0.05em;
  }
  #content {
    font-size: 1rem;
    word-break: break-word;
    margin-bottom: 3rem;
  }
  #content p { margin-bottom: 1.2em; }
  #images {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    margin-bottom: 3rem;
  }
  #images img { max-width: 100%; height: auto; display: block; }
  nav {
    display: flex;
    justify-content: space-between;
    font-size: 0.85rem;
    border-top: 1px solid #eee;
    padding-top: 1rem;
    margin-top: 1rem;
  }
  nav a { color: #999; text-decoration: none; letter-spacing: 0.04em; }
  nav a:hover { color: #111; }
  #loading { color: #999; font-size: 0.9rem; }
</style>
</head>
<body>
<header>
  <a href="./">← all</a>
  <h1 id="title">...</h1>
</header>
<div id="loading">loading...</div>
<div id="content"></div>
<div id="images"></div>
<nav>
  <span id="prev-link"></span>
  <span id="next-link"></span>
</nav>
<script>
function parseText(text) {
  return text
    .split(/\n\n+/)
    .map(p => {
      const html = p
        .replace(/\n/g, '<br>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      return `<p>${html}</p>`;
    })
    .join('');
}

const params = new URLSearchParams(location.search);
const date = params.get('date');

if (!date) {
  document.getElementById('loading').textContent = 'no date specified.';
} else {
  document.getElementById('title').textContent = date;
  document.title = date;

  Promise.all([
    fetch(`entries/${date}.json`).then(r => r.json()),
    fetch('index.json').then(r => r.json())
  ]).then(([entry, entries]) => {
    document.getElementById('loading').remove();

    if (entry.text) {
      document.getElementById('content').innerHTML = parseText(entry.text);
    }

    if (entry.images && entry.images.length) {
      const imgDiv = document.getElementById('images');
      entry.images.forEach(src => {
        const img = document.createElement('img');
        img.src = src;
        img.alt = '';
        imgDiv.appendChild(img);
      });
    }

    // index.json は [[date, thumb], ...] 形式
    const dates = entries.map(e => e[0]);
    const sorted = [...dates].sort((a, b) => b.localeCompare(a));
    const idx = sorted.indexOf(date);

    const prev = sorted[idx + 1];
    const next = sorted[idx - 1];

    document.getElementById('prev-link').innerHTML =
      prev ? `<a href="entry.html?date=${prev}">← ${prev}</a>` : '';
    document.getElementById('next-link').innerHTML =
      next ? `<a href="entry.html?date=${next}">${next} →</a>` : '';

  }).catch(() => {
    document.getElementById('loading').textContent = 'entry not found.';
  });
}
</script>
</body>
</html>
