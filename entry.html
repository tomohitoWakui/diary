<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>diary</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    background: #fff;
    color: #111;
    padding: 2rem 1.5rem;
    max-width: 640px;
    margin: 0 auto;
    line-height: 1.8;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #111; color: #eee; }
    a { color: #eee; }
    a:hover { color: #aaa; }
    nav a { color: #999; }
    nav a:hover { color: #eee; }
    img { opacity: 0.9; }
  }
  header {
    display: flex;
    align-items: baseline;
    gap: 1.5rem;
    margin-bottom: 2.5rem;
  }
  header a {
    color: #999;
    text-decoration: none;
    font-size: 0.85rem;
    letter-spacing: 0.04em;
  }
  header a:hover { color: #111; }
  h1 {
    font-size: 1rem;
    font-weight: 400;
    letter-spacing: 0.05em;
  }
  #content {
    font-size: 1rem;
    white-space: pre-wrap;
    word-break: break-word;
    margin-bottom: 3rem;
  }
  #content p { margin-bottom: 1.2em; }
  #images {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    margin-bottom: 3rem;
  }
  #images img {
    max-width: 100%;
    height: auto;
    display: block;
  }
  nav {
    display: flex;
    justify-content: space-between;
    font-size: 0.85rem;
    border-top: 1px solid #eee;
    padding-top: 1rem;
    margin-top: 1rem;
  }
  nav a {
    color: #999;
    text-decoration: none;
    letter-spacing: 0.04em;
  }
  nav a:hover { color: #111; }
  nav span { color: #ddd; }
  #loading { color: #999; font-size: 0.9rem; }
</style>
</head>
<body>
<header>
  <a href="index.html">← all</a>
  <h1 id="title">...</h1>
</header>
<div id="loading">loading...</div>
<div id="content"></div>
<div id="images"></div>
<nav id="nav" style="display:none">
  <span id="prev-link"></span>
  <span id="next-link"></span>
</nav>
<script>
const params = new URLSearchParams(location.search);
const date = params.get('date');

if (!date) {
  document.getElementById('loading').textContent = 'no date specified.';
} else {
  document.getElementById('title').textContent = date;
  document.title = date;

  fetch('entries.json')
    .then(r => r.json())
    .then(entries => {
      document.getElementById('loading').remove();
      const sorted = [...entries].sort((a, b) => b.date.localeCompare(a.date));
      const idx = sorted.findIndex(e => e.date === date);

      if (idx === -1) {
        document.getElementById('content').textContent = 'entry not found.';
        return;
      }

      const entry = sorted[idx];

      // text
      if (entry.text) {
        const el = document.getElementById('content');
        el.innerHTML = entry.text
          .split(/\n\n+/)
          .map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`)
          .join('');
      }

      // images
      if (entry.images && entry.images.length) {
        const imgDiv = document.getElementById('images');
        entry.images.forEach(src => {
          const img = document.createElement('img');
          img.src = src;
          img.alt = '';
          imgDiv.appendChild(img);
        });
      }

      // nav
      const nav = document.getElementById('nav');
      nav.style.display = 'flex';

      const prevEntry = sorted[idx + 1];
      const nextEntry = sorted[idx - 1];

      const prevEl = document.getElementById('prev-link');
      const nextEl = document.getElementById('next-link');

      if (prevEntry) {
        prevEl.innerHTML = `<a href="entry.html?date=${prevEntry.date}">← ${prevEntry.date}</a>`;
      } else {
        prevEl.innerHTML = `<span></span>`;
      }

      if (nextEntry) {
        nextEl.innerHTML = `<a href="entry.html?date=${nextEntry.date}">${nextEntry.date} →</a>`;
      } else {
        nextEl.innerHTML = `<span></span>`;
      }
    })
    .catch(() => {
      document.getElementById('loading').textContent = 'failed to load entries.';
    });
}
</script>
</body>
</html>
