<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>post</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    background: #fff;
    color: #111;
    padding: 2rem 1.5rem;
    max-width: 640px;
    margin: 0 auto;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #111; color: #eee; }
    input, textarea { background: #222; color: #eee; border-color: #444; }
    input:focus, textarea:focus { border-color: #888; }
    .json-box { background: #1a1a1a; border-color: #333; color: #aaa; }
  }
  h1 { font-size: 1rem; font-weight: 400; color: #999; margin-bottom: 2rem; letter-spacing: 0.05em; }
  label { display: block; font-size: 0.8rem; color: #999; margin-bottom: 0.4rem; letter-spacing: 0.04em; }
  input[type="text"], input[type="password"], input[type="date"], textarea {
    width: 100%; border: 1px solid #ddd; border-radius: 4px;
    padding: 0.6rem 0.8rem; font-size: 1rem; font-family: inherit;
    outline: none; margin-bottom: 1.5rem;
  }
  input:focus, textarea:focus { border-color: #999; }
  textarea { height: 240px; resize: vertical; line-height: 1.7; }
  button {
    background: #111; color: #fff; border: none;
    padding: 0.7rem 1.5rem; font-size: 0.9rem; font-family: inherit;
    border-radius: 4px; cursor: pointer; letter-spacing: 0.04em; margin-right: 0.5rem;
  }
  button:hover { background: #444; }
  @media (prefers-color-scheme: dark) {
    button { background: #eee; color: #111; }
    button:hover { background: #bbb; }
  }
  #post-form { display: none; }
  .step { margin-top: 2rem; padding-top: 2rem; border-top: 1px solid #eee; display: none; }
  .step-label { font-size: 0.75rem; color: #bbb; margin-bottom: 1rem; letter-spacing: 0.04em; }
  .note { font-size: 0.8rem; color: #999; margin-bottom: 1rem; line-height: 1.6; }
  .json-box {
    background: #f5f5f5; border: 1px solid #eee; border-radius: 4px;
    padding: 1rem; font-size: 0.75rem; font-family: monospace;
    white-space: pre-wrap; word-break: break-all; margin-bottom: 1rem; line-height: 1.6;
  }
  #msg { font-size: 0.85rem; color: #999; margin-top: 1rem; }
  #login-msg { font-size: 0.85rem; color: #c00; margin-top: 0.8rem; }
</style>
</head>
<body>
<h1>post</h1>

<div id="login-form">
  <label for="pw">password</label>
  <input type="password" id="pw" autocomplete="current-password">
  <button onclick="login()">enter</button>
  <div id="login-msg"></div>
</div>

<div id="post-form">
  <label for="date">date</label>
  <input type="date" id="date">
  <label for="text">text</label>
  <textarea id="text" placeholder="今日のこと..."></textarea>
  <label for="images">images（任意、カンマ区切り）</label>
  <input type="text" id="images" placeholder="images/2026-06-12-1.jpg">
  <button onclick="generate()">生成 →</button>

  <!-- Step 2: エントリーJSON -->
  <div class="step" id="step-entry">
    <div class="step-label">step 1 — entries/日付.json をGitHubに作る</div>
    <div class="note"><code>entries/</code> フォルダに <strong id="entry-filename"></strong> という名前で新規ファイルを作り、下のJSONを貼る。</div>
    <div class="json-box" id="entry-json"></div>
    <button onclick="copyText('entry-json', 'msg1')">コピー</button>
    <a id="entry-link" href="#" target="_blank"><button type="button">GitHubで新規作成 →</button></a>
    <div id="msg1" style="font-size:0.85rem;color:#999;margin-top:0.8rem;"></div>
  </div>

  <!-- Step 3: index.json -->
  <div class="step" id="step-index">
    <div class="step-label">step 2 — index.json を更新する</div>
    <div class="note">GitHubの <strong>index.json</strong> を編集して、下のJSONで全部置き換える。</div>
    <div class="json-box" id="index-json"></div>
    <button onclick="copyText('index-json', 'msg2')">コピー</button>
    <a href="https://github.com/tomohitowakui/diary/edit/main/index.json" target="_blank"><button type="button">GitHubで開く →</button></a>
    <div id="msg2" style="font-size:0.85rem;color:#999;margin-top:0.8rem;"></div>
  </div>
</div>

<script>
const PASSWORD = 'tomo0128';

function login() {
  if (document.getElementById('pw').value === PASSWORD) {
    document.getElementById('login-form').style.display = 'none';
    document.getElementById('post-form').style.display = 'block';
    const today = new Date();
    const y = today.getFullYear();
    const m = String(today.getMonth()+1).padStart(2,'0');
    const d = String(today.getDate()).padStart(2,'0');
    document.getElementById('date').value = `${y}-${m}-${d}`;
  } else {
    document.getElementById('login-msg').textContent = 'wrong password.';
  }
}
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('pw').addEventListener('keydown', e => { if(e.key==='Enter') login(); });
});

async function generate() {
  const date = document.getElementById('date').value;
  const text = document.getElementById('text').value.trim();
  const imagesRaw = document.getElementById('images').value.trim();
  if (!date || !text) { alert('date と text は必須です'); return; }
  const images = imagesRaw ? imagesRaw.split(',').map(s=>s.trim()).filter(Boolean) : [];

  // エントリーJSON
  const entryJSON = JSON.stringify({ text, images }, null, 2);
  document.getElementById('entry-json').textContent = entryJSON;
  document.getElementById('entry-filename').textContent = `${date}.json`;
  document.getElementById('entry-link').href =
    `https://github.com/tomohitowakui/diary/new/main/entries?filename=${date}.json`;

  // index.json を取得して更新
  let dates = [];
  try {
    const res = await fetch('index.json?t=' + Date.now());
    dates = await res.json();
  } catch(e) { dates = []; }
  if (!dates.includes(date)) dates.push(date);
  dates.sort((a,b) => b.localeCompare(a));
  document.getElementById('index-json').textContent = JSON.stringify(dates, null, 2);

  document.getElementById('step-entry').style.display = 'block';
  document.getElementById('step-index').style.display = 'block';
  document.getElementById('step-entry').scrollIntoView({ behavior: 'smooth' });
}

function copyText(id, msgId) {
  const text = document.getElementById(id).textContent;
  navigator.clipboard.writeText(text).then(() => {
    document.getElementById(msgId).textContent = '✓ コピーしました';
  });
}
</script>
</body>
</html>
